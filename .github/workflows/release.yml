name: Build and Release with Custom Docker Container

on:
  push:
    tags:
      - 'v*'

jobs:
  # Linux wheels (manylinux x86_64 + aarch64) and the sdist, cross-compiled with
  # zig inside a custom maturin image. The sdist is uploaded ONLY here.
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build and Push in Docker Container
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          -e TWINE_USERNAME="__token__" \
          -e TWINE_PASSWORD="${{ secrets.PYPI_API_TOKEN }}" \
          -e PYTHON_KEYRING_BACKEND="keyring.backends.null.Keyring" \
          ghcr.io/okamumu/maturin:1.7.8 \
          /bin/bash -c "
          set -e
          echo 'Starting build process...'
          mkdir -p dist
          maturin build --release --target x86_64-unknown-linux-gnu -i python3.9 -i python3.10 -i python3.11 --zig --out dist
          maturin build --release --target aarch64-unknown-linux-gnu -i python3.9 -i python3.10 -i python3.11 --zig --out dist
          maturin sdist --out dist
          echo 'Build complete. Listing dist directory contents:'
          ls -lh dist
          echo 'Uploading to PyPI...'
          twine upload --skip-existing dist/*.whl dist/*.tar.gz
          echo 'Upload complete.'
          "

  # macOS wheels: arm64 (macos-14, Apple Silicon) and x86_64 (macos-13, Intel).
  # Native maturin build on the macOS runner — no Docker, no zig. Each job
  # uploads only its own wheel; --skip-existing keeps concurrent/rerun uploads safe.
  macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14]
        python: ['3.9', '3.10', '3.11']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build and upload wheel
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install maturin twine
          maturin build --release --out dist -i python
          ls -lh dist
          twine upload --skip-existing dist/*.whl

  # Windows wheels: x86_64 (win_amd64). Windows-on-ARM is skipped (immature
  # Python arm64 ecosystem). Native maturin build on the Windows runner.
  windows:
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11']
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build and upload wheel
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install maturin twine
          maturin build --release --out dist -i python
          ls -lh dist
          twine upload --skip-existing dist/*.whl
